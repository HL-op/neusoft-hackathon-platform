[server]
http_port = 3000
domain = your-domain.com
root_url = https://your-domain.com/grafana

[database]
type = sqlite3

[analytics]
check_for_updates = true

[security]
admin_user = admin
admin_password = ${GRAFANA_ADMIN_PASSWORD}

[users]
allow_sign_up = false

[auth]
disable_login_form = false

[auth.anonymous]
enabled = false

[smtp]
enabled = false
