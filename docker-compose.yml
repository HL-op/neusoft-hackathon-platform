version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/neusoft_hackathon
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JUDGE0_API_URL=http://judge0:2358
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
    depends_on:
      - db
      - judge0

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neusoft_hackathon
    volumes:
      - postgres_data:/var/lib/postgresql/data

  judge0:
    image: judge0/judge0:1.13.0
    ports:
      - "2358:2358"
      - "2359:2359"
    environment:
      - SECRET_KEY_BASE=${JUDGE0_SECRET_KEY_BASE}
    volumes:
      - judge0_data:/var/lib/judge0
    depends_on:
      - db

volumes:
  postgres_data:
  judge0_data: